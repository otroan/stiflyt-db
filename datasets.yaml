# Configuration file for downloading Kartverket/Geonorge datasets
# Generated for: teig (PostGIS), stedsnavn (FGDB)

- name: teig
  dataset: "Matrikkelen - Eiendomskart Teig PostGIS-format"
  format: PostGIS
  utm_zone: 25833  # Available: 25833
  area_filter: Norge  # Nationwide data only
  output_dir: ./data/matrikkel

- name: stedsnavn
  dataset: "Stedsnavn (komplett SSR) FGDB-format"
  format: FGDB
  utm_zone: 25833  # EPSG:25833 (UTM zone 33N) - Transform to match nodes SRID for spatial matching
  feed_url: "https://nedlasting.geonorge.no/geonorge/ATOM-feeds/Stedsnavn_AtomFeedFGDB.xml"
  area_filter: Norge  # Nationwide data only
  output_dir: ./data/stedsnavn
